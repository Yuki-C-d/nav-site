<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fake-star ✦ 导航</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent2: #f78166;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 20px 80px;
  }
  header {
    text-align: center;
    padding: 20px 0 40px;
  }
  header h1 { font-size: 24px; letter-spacing: 3px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); margin-top: 6px; font-size: 13px; }
  .links {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .links a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, transform 0.15s;
  }
  .links a:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .links .icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .links .info { min-width: 0; }
  .links .title {
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .links .domain {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .tag-工具 { background: #1a2332; color: #58a6ff; }
  .tag-动漫 { background: #2a1a1a; color: #f78166; }
  .tag-AI  { background: #1a2a1a; color: #3fb950; }
  .tag-归档 { background: #2a1a2a; color: #d2a8ff; }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 50px;
  }
</style>
</head>
<body>

<header>

  <p>我的集锦归档</p>
</header>

<main>

        <div class="domain">dongmanhuayuan.myheartsite.com</div>
      </div>
    </a>

    <a href="https://www.aowu.tv/" target="_blank" rel="noopener">
      <div class="icon tag-动漫">🎥</div>
      <div class="info">
        <div class="title">嗷呜动漫</div>
        <div class="domain">aowu.tv</div>
      </div>
    </a>

    <a href="https://chub.ai/" target="_blank" rel="noopener">
      <div class="icon tag-AI">🤖</div>
      <div class="info">
        <div class="title">Chub.ai — 角色卡社区</div>
        <div class="domain">chub.ai</div>
      </div>
    </a>

    <a href="https://convertio.co/" target="_blank" rel="noopener">
      <div class="icon tag-工具">🔄</div>
      <div class="info">
        <div class="title">Convertio — 在线文件转换</div>
        <div class="domain">convertio.co</div>
      </div>
    </a>

  </div>
</main>

<footer class="footer">
  fake-star.xyz · 2026
</footer>

</body>
</html>
